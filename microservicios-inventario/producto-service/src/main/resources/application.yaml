server:
  port: 8081
spring:
  application:
    name: producto-service
  datasource:
    url: jdbc:h2:mem:inventariodb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true