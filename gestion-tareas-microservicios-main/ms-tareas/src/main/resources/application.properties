# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8082
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# SPRING APPLICATION NAME
# ============================================
spring.application.name=ms-tareas

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/microservicios_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================
# JWT Configuration - DEBE SER EXACTAMENTE IGUAL A ms-usuarios
jwt.secret=miClaveSuperSecretaParaJWT1234567890QueTieneAlMenos32Bytes
jwt.expiration=86400000

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.example.ms_tareas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# SPRINGDOC OPENAPI (SWAGGER) CONFIGURATION
# ============================================

# Habilitar OpenAPI
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# Configuración de Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.disable-swagger-default-url=true

# ? Paquetes a escanear (ajusta según tu estructura)
springdoc.packages-to-scan=com.example.ms_tareas.controller

# Mostrar información del actuador
springdoc.show-actuator=true

# Cache de OpenAPI (recomendado para producción)
springdoc.cache.disabled=false

# ============================================
# SPRING BOOT ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.info.env.enabled=true
management.endpoint.health.show-details=always

# ============================================
# INFORMACIÓN DE LA API PARA SWAGGER
# ============================================
info.app.name=${spring.application.name:ms-tareas}
info.app.version=1.0.0
info.app.description=Microservicio de Tareas para Gestión de Tareas
info.app.contact.name=Soporte Técnico
info.app.contact.email=soporte@example.com

# ============================================
# JACKSON CONFIGURATION (JSON)
# ============================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss