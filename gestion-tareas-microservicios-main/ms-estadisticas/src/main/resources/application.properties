# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8083
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# SPRING APPLICATION NAME
# ============================================
spring.application.name=ms-estadisticas

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/microservicios_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=miClaveSuperSecretaParaJWT1234567890QueTieneAlMenos32Bytes

# ============================================
# LOGGING
# ============================================
logging.level.com.example.ms_estadisticas=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================
# SWAGGER
# ============================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.ms_estadisticas.controller

# ============================================
# URLs DE OTROS MICROSERVICIOS
# ============================================
ms-tareas.url=http://localhost:8082