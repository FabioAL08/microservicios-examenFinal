# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
spring.application.name=gateway-service

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.example.gateway_service=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ============================================
# SPRINGDOC OPENAPI (SWAGGER) CONFIGURATION
# ============================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=API Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs

springdoc.api-docs.resolve-schema-properties=true
springdoc.show-actuator=false
springdoc.writer-with-default-pretty-printer=true
springdoc.api-docs.content-type.yaml.enabled=true

# ============================================
# GATEWAY ROUTES
# ============================================

# Ruta 0: Swagger UI (primero para que coincida antes)
spring.cloud.gateway.routes[0].id=swagger-ui
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/swagger-ui/**,/swagger-ui.html

# Ruta 1: API Docs (para obtener el JSON combinado)
spring.cloud.gateway.routes[1].id=api-docs
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/v3/api-docs/**,/v3/api-docs.yaml

# Ruta 2: ms-usuarios V1
spring.cloud.gateway.routes[2].id=ms-usuarios
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**,/api/usuarios/**

# Ruta 3: ms-tareas V1 (legacy)
spring.cloud.gateway.routes[3].id=ms-tareas
spring.cloud.gateway.routes[3].uri=http://localhost:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/tareas/**

# Ruta 4: ms-tareas V2 (nueva versión)
spring.cloud.gateway.routes[4].id=ms-tareas-v2
spring.cloud.gateway.routes[4].uri=http://localhost:8082
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v2/tareas/**

# Ruta 5: ms-estadisticas
spring.cloud.gateway.routes[5].id=ms-estadisticas
spring.cloud.gateway.routes[5].uri=http://localhost:8083
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/estadisticas/**

