server:
  port: 8082

spring:
  application:
    name: matricula-service

  datasource:
    url: jdbc:h2:mem:matriculadb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true